services:
  consigliere:
    build: .
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:size=10M,nosuid,nodev
    volumes:
      - ./config/consigliere.toml:/etc/consigliere/consigliere.toml:ro
      - ./shared:/shared/consigliere
    environment:
      - CONSIGLIERE_CONFIG_PATH=/etc/consigliere/consigliere.toml
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
          pids: 50
